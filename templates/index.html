<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>RAG Chatbot</h1>
            <p class="subtitle">Upload documents and ask questions</p>
        </header>

        <div class="upload-section">
            <form id="upload-form">
                <label for="file-input" class="upload-btn">
                    Upload Document (PDF/TXT)
                </label>
                <input type="file" id="file-input" accept=".pdf,.txt,.md" hidden>
                <span id="upload-status"></span>
            </form>
            <div id="doc-list"></div>
        </div>

        <div class="chat-container">
            <div id="chat-messages" class="messages"></div>
            <form id="chat-form" class="input-area">
                <input type="text" id="message-input" placeholder="Ask a question about your documents..." autocomplete="off">
                <button type="submit" id="send-btn">Send</button>
            </form>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
